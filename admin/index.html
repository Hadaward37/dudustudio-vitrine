<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — DuduStudio</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="stylesheet" href="../assets/css/style.css"/>
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .admin-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .admin-card h1 { font-family: 'Playfair Display', serif; color: var(--gold); margin-bottom: 8px; }
    .admin-card p  { color: var(--gray); font-size: .9rem; margin-bottom: 28px; }
    .admin-links   { display: flex; flex-direction: column; gap: 12px; }
    .admin-link {
      display: flex; align-items: center; gap: 12px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      padding: 14px 18px;
      color: var(--gray);
      font-size: .9rem;
      transition: .3s;
      text-decoration: none;
    }
    .admin-link:hover { border-color: var(--gold); color: var(--gold); }
    .admin-link i { color: var(--gold); width: 20px; }
  </style>
</head>
<body>
  <div class="admin-card">
    <h1>🔒 Admin</h1>
    <p>Área administrativa do DuduStudio.<br/>Acesso restrito.</p>

    <div class="admin-links">
      <a href="../index.html" class="admin-link">
        <i class="fas fa-home"></i> Site principal
      </a>
      <a href="../dudushield.html" class="admin-link">
        <i class="fas fa-shield-alt"></i> Página DuduShield™
      </a>
      <a href="../index.html#dudushield-panel" class="admin-link">
        <i class="fas fa-chart-bar"></i> Painel DuduShield™
      </a>
      <a href="https://vercel.com/dashboard" target="_blank" class="admin-link">
        <i class="fas fa-server"></i> Vercel Dashboard
      </a>
      <a href="https://github.com/Hadaward37/dudustudio-vitrine" target="_blank" class="admin-link">
        <i class="fab fa-github"></i> Repositório GitHub
      </a>
    </div>
  </div>

  <script src="../assets/js/security.js"></script>
</body>
</html>
