<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — DuduStudio</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23d6b36a'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' fill='%230a0a0a' font-size='15' font-weight='bold' font-family='serif'%3EDS%3C/text%3E%3C/svg%3E">
  <meta name="robots" content="noindex, nofollow"/>
  <meta http-equiv="X-Frame-Options" content="DENY"/>
  <meta http-equiv="X-Content-Type-Options" content="nosniff"/>
  <meta http-equiv="Referrer-Policy" content="no-referrer"/>
  <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=()"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; frame-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'none'; upgrade-insecure-requests"/>
  <style>
    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    .login-box {
      background: #111;
      border: 1px solid rgba(214,179,106,.2);
      border-radius: 16px;
      padding: 48px 40px;
      text-align: center;
      width: 340px;
    }

    h1 { color: #d6b36a; font-size: 1.2rem; margin-bottom: 8px; }
    p  { color: #555; font-size: .8rem; margin-bottom: 28px; line-height: 1.5; }

    input {
      width: 100%;
      padding: 12px 16px;
      background: #0a0a0a;
      border: 1px solid #222;
      color: #fff;
      border-radius: 8px;
      font-family: monospace;
      font-size: .9rem;
      margin-bottom: 12px;
      outline: none;
      box-sizing: border-box;
      transition: border-color .3s;
    }

    input:focus { border-color: rgba(214,179,106,.4); }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #d6b36a, #f2d798);
      color: #000;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-family: monospace;
      font-size: .9rem;
      transition: opacity .3s;
    }

    button:hover { opacity: .85; }

    .error {
      color: #ff4444;
      font-size: .8rem;
      margin-top: 12px;
      display: none;
      padding: 8px 12px;
      background: rgba(255,68,68,.08);
      border: 1px solid rgba(255,68,68,.2);
      border-radius: 8px;
    }

    .dashboard {
      display: none;
      width: 100%;
      max-width: 520px;
      flex-direction: column;
      gap: 12px;
    }

    .dash-title {
      color: #d6b36a;
      font-size: 1.1rem;
      margin-bottom: 8px;
      text-align: center;
    }

    .dash-link {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #111;
      border: 1px solid #1a1a1a;
      border-radius: 12px;
      padding: 16px 20px;
      color: #bdbdbd;
      font-size: .88rem;
      text-decoration: none;
      transition: .3s;
      font-family: monospace;
    }

    .dash-link:hover { border-color: rgba(214,179,106,.3); color: #d6b36a; }

    .dash-icon {
      font-size: 1.1rem;
      width: 24px;
      text-align: center;
      flex-shrink: 0;
    }

    .dash-logout {
      margin-top: 8px;
      background: transparent;
      color: #555;
      border: 1px solid #222;
      font-size: .8rem;
      padding: 10px;
    }

    .dash-logout:hover { color: #ff4444; border-color: rgba(255,68,68,.3); opacity: 1; }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-box" id="loginBox">
    <h1>🔒 DuduStudio Admin</h1>
    <p>Área restrita — somente para o administrador</p>
    <input type="password" id="pass" placeholder="Senha de acesso"
           onkeydown="if(event.key==='Enter') login()"/>
    <button onclick="login()">Entrar</button>
    <div class="error" id="err">Senha incorreta.</div>
  </div>

  <!-- DASHBOARD (aparece após login) -->
  <div class="dashboard" id="dashboard">
    <div class="dash-title">🔒 DuduStudio Admin</div>

    <a href="../index.html" class="dash-link">
      <span class="dash-icon">🏠</span> Site principal
    </a>
    <a href="../dudushield.html" class="dash-link">
      <span class="dash-icon">🛡</span> Página DuduShield™
    </a>
    <a href="../index.html#dudushield-panel" class="dash-link" onclick="localStorage.setItem('ds_from_admin','1')">
      <span class="dash-icon">📊</span> Painel DuduShield™ (logs)
    </a>
    <a href="https://vercel.com/dashboard" target="_blank" class="dash-link">
      <span class="dash-icon">▲</span> Vercel Dashboard
    </a>
    <a href="https://github.com/Hadaward37/dudustudio-vitrine" target="_blank" class="dash-link">
      <span class="dash-icon">⌥</span> Repositório GitHub
    </a>
    <a href="../demos/landing/doceria/index.html" target="_blank" class="dash-link">
      <span class="dash-icon">🍫</span> Demo — La Douceur (Doceria)
    </a>
    <a href="../demos/landing/petshop/index.html" target="_blank" class="dash-link">
      <span class="dash-icon">🐾</span> Demo — PetShop
    </a>
    <a href="../demos/landing/bella-doces/index.html" target="_blank" class="dash-link">
      <span class="dash-icon">🎂</span> Demo — Bella Doces
    </a>

    <button class="dash-logout" onclick="logout()">Sair da sessão</button>
  </div>

  <script src="../assets/js/security.js"></script>
  <script>
    var HASH = btoa('admin@dudu2025!');
    var SESSION_KEY = 'ds_admin_auth';
    var attempts = 0;
    var MAX_ATTEMPTS = 3;

    function login() {
      if (attempts >= MAX_ATTEMPTS) {
        var err = document.getElementById('err');
        err.textContent = 'Bloqueado. Recarregue a página.';
        err.style.display = 'block';
        document.querySelector('button').disabled = true;
        return;
      }

      var pass = document.getElementById('pass').value;
      if (btoa(pass) === HASH) {
        localStorage.setItem(SESSION_KEY, btoa(Date.now().toString()));
        window.location.href = 'dashboard.html';
      } else {
        attempts++;
        var remaining = MAX_ATTEMPTS - attempts;
        var err = document.getElementById('err');
        err.textContent = remaining > 0
          ? 'Senha incorreta. ' + remaining + ' tentativa(s) restante(s).'
          : 'Bloqueado. Recarregue a página.';
        err.style.display = 'block';
        if (attempts >= MAX_ATTEMPTS) {
          document.querySelector('button').disabled = true;
        }
        document.getElementById('pass').value = '';
      }
    }

    // Verifica sessão ao carregar — redireciona direto pro dashboard
    if (localStorage.getItem(SESSION_KEY)) {
      try {
        var ts = parseInt(atob(localStorage.getItem(SESSION_KEY)));
        if (Date.now() - ts < 8 * 60 * 60 * 1000) {
          window.location.href = 'dashboard.html';
        } else {
          localStorage.removeItem(SESSION_KEY);
        }
      } catch (e) {
        localStorage.removeItem(SESSION_KEY);
      }
    }
  </script>
</body>
</html>
